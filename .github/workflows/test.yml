# Runs the JUnit 5 unit test suite on every push and pull request.
# This is a lighter-weight companion to build.yml: it skips the Fabric
# remap jar step and only exercises the pure-logic tests, giving contributors
# a fast signal when something breaks.

name: test
on: [pull_request, push]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v4.2.2
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: setup jdk 25
        uses: actions/setup-java@v4.6.0
        with:
          java-version: "25"
          distribution: "zulu"
      - name: run unit tests
        run: ./gradlew test --stacktrace
      - name: upload test reports
        if: always()
        uses: actions/upload-artifact@v4.6.0
        with:
          name: test-reports
          path: build/reports/tests/test/
          if-no-files-found: ignore
